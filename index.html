<!DOCTYPE html>
<html>
<head>
<title>GxP Training System</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; }
.box { border:1px solid #ccc; padding:10px; margin-right:10px; }
</style>

</head>

<body>

<h2>GxP Training Tracker</h2>

<!-- Dashboard -->
<div style="display:flex">
<div class="box">Total: <span id="total">0</span></div>
<div class="box">Completed: <span id="completed">0</span></div>
<div class="box">Pending: <span id="pending">0</span></div>
</div>

<br>

<!-- Role -->
<label>Role:</label>
<select id="role">
<option>User</option>
<option>Admin</option>
</select>

<br><br>

<!-- Search -->
<input type="text" id="search" placeholder="Search..." onkeyup="searchTable()">

<br><br>

<!-- Filter -->
<select id="filter" onchange="filterStatus()">
<option value="">All Status</option>
<option value="Completed">Completed</option>
<option value="Pending">Pending</option>
</select>

<br><br>

<!-- Upload -->
<input type="file" id="fileInput">
<button onclick="loadExcel()">Upload Excel</button>

<br><br>

<table border="1" id="table"></table>

<script>

let data = JSON.parse(localStorage.getItem("trainingData") || "[]");

function loadExcel() {

  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Select file first");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {

    const dataArray = new Uint8Array(e.target.result);

    const wb = XLSX.read(dataArray, { type: "array" });

    const sheet = wb.Sheets[wb.SheetNames[0]];

    data = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

    localStorage.setItem("trainingData", JSON.stringify(data));

    render();
  };

  reader.readAsArrayBuffer(file);
}

function render() {

  let html = "";

  data.forEach((row, i) => {

    html += "<tr>";

    row.forEach((cell, j) => {

      if (i === 0) {
        html += "<th>" + cell + "</th>";
      } else {

        let editable = (j < 4); // only first columns editable

        html += `<td contenteditable="${editable}"
                    onblur="update(${i},${j},this.innerText)">
                    ${cell || ""}
                 </td>`;
      }

    });

    if (i !== 0) {
      html += `<td>
        <button onclick="submit(${i})">Submit</button>
        <button onclick="approve(${i})">Approve</button>
      </td>`;
    }

    html += "</tr>";
  });

  document.getElementById("table").innerHTML = html;

  updateDashboard();
}

function update(i, j, value) {
  data[i][j] = value;
  save();
}

function submit(i) {

  const role = document.getElementById("role").value;

  if (role !== "User") {
    alert("Only User can submit");
    return;
  }

  data[i][5] = "Yes";
  data[i][4] = "Pending";

  save();
}

function approve(i) {

  const role = document.getElementById("role").value;

  if (role !== "Admin") {
    alert("Only Admin can approve");
    return;
  }

  if (data[i][5] !== "Yes") {
    alert("Submit first");
    return;
  }

  data[i][6] = "Approved";
  data[i][4] = "Completed";

  save();
}

function save() {
  localStorage.setItem("trainingData", JSON.stringify(data));
  render();
}

function updateDashboard() {

  let total = data.length - 1;
  let completed = 0;
  let pending = 0;

  for (let i = 1; i < data.length; i++) {
    if (data[i][4] === "Completed") completed++;
    else pending++;
  }

  document.getElementById("total").innerText = total;
  document.getElementById("completed").innerText = completed;
  document.getElementById("pending").innerText = pending;
}

function searchTable() {

  let value = document.getElementById("search").value.toLowerCase();
  let rows = document.querySelectorAll("#table tr");

  rows.forEach((row, i) => {
    if (i === 0) return;
    row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none";
  });
}

function filterStatus() {

  let value = document.getElementById("filter").value;
  let rows = document.querySelectorAll("#table tr");

  rows.forEach((row, i) => {
    if (i === 0) return;
    row.style.display = row.innerText.includes(value) || value === "" ? "" : "none";
  });
}

render();

</script>

</body>
</html>
